<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Widget Test</title>
    <link rel="preconnect" href="https://chattercheatah-900139201687.us-central1.run.app" crossorigin>
</head>
<body>
    <h1>Chat Widget Test Page</h1>
    <p>This page tests the ConvoPro chat widget.</p>

    <script>
    (function(){
      var u='https://chattercheatah-900139201687.us-central1.run.app',done=false;
      function load(){
        if(done)return;done=true;
        var s=document.createElement('script');
        s.src=u+'/static/chat-widget.js';
        s.onload=function(){
          if(typeof ConvoPro!=='undefined'){
            ConvoPro.init({apiUrl:u+'/api/v1',tenantId:4,scrollBehavior:'top'});
            console.log('Chat widget initialized successfully');
          }else{
            console.error('ConvoPro widget failed to load');
          }
        };
        document.head.appendChild(s);
      }
      if(/Mobi|Android/i.test(navigator.userAgent)){
        ['scroll','touchstart','click'].forEach(function(e){
          window.addEventListener(e,load,{once:true,passive:true});
        });
        setTimeout(load,5000);
      }else{
        if(document.readyState==='complete'){
          ('requestIdleCallback' in window)?requestIdleCallback(load):setTimeout(load,100);
        }else{
          window.addEventListener('load',function(){
            ('requestIdleCallback' in window)?requestIdleCallback(load):setTimeout(load,100);
          });
        }
      }
    })();
    </script>
</body>
</html>
